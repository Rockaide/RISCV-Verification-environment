# CI configuration for Whisper simulator

# SsstrictS & SsstrictU excluded as they are not supported by the old trap handler
# SsstrictSm excluded because of Sail bugs
# 1. incorrect decoding of add.uw instruction) Link: https://github.com/riscv/sail-riscv/issues/1711
# 2. vmv<nr>r.v instructions fail to trap when vill=1 Link: https://github.com/riscv/sail-riscv/issues/1709
# 3. Add configuration parameter for vsetvli/vsetvl behavior on reserved vtype values Link: https://github.com/riscv/sail-riscv/issues/1699
# InterruptsSm excluded due to Whisper bug
# 1. setting mtimecmp equal to mtime using sd does not trigger machine timer interrupt: https://github.com/tenstorrent/whisper/issues/26
ci_enabled: true
# TODO: Remove SsstrictV when sail SsstrictV is implemented
exclude_extensions: "Sm,SsstrictSm,SsstrictS,SsstrictU,InterruptsSm,InterruptsS,InterruptsU,ExceptionsZalrsc,ExceptionsZaamo,PMPSm,Svadu,SvaduPMP,Zalrsc,ExceptionsSvZaamo,ExceptionsSvZalrsc,SsstrictV"
install_script: ".github/scripts/install-whisper.sh"
apt_packages: "libboost-program-options-dev"
