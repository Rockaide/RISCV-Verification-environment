      false,
      false, # 16..23
      false,
      false,
      false,
      false,
      false,
      false,
      false,
      false, # 24..31 (unimplemented)
    ]
  MCOUNTINHIBIT_IMPLEMENTED: true
  COUNTINHIBIT_EN: # VERIFIED — perf_counters.rst § "Controlling the counters from software": bit 0=mcycle, bit 2=minstret, bit X=mhpmcounterX; control_status_registers.rst § "Machine Counter-Inhibit register (mcountinhibit)": non-implemented counters read 0
    [
      true, # index 0 (MCYCLE inhibit — mcountinhibit_q[0] gates cycle counter)
      false, # index 1 (TM — always false, mcountinhibit.TM is read-only-0 per UDB)
      true, # index 2 (MINSTRET inhibit — mcountinhibit_q[2] gates instret counter)
      true, # index 3 (MHPMCOUNTER3 inhibit — mcountinhibit_q[3] gates hpmcounter3)
      false, # 4
      false,
      false,
      false, # 7
      false,
      false,
      false,
      false,
      false,
      false,
      false,
      false, # 8..15
      false,
      false,
      false,
      false,
      false,
      false,
      false,
      false, # 16..23
      false,
      false,
      false,
      false,
      false,
      false,
      false,
      false, # 24..31 (unimplemented)
    ]
  NUM_PMP_ENTRIES: 0
  MCOUNTENABLE_EN:
    [
      true,
      true,
      true,
      true,
      false,
      false,
      false,
      false,
      false,
      false,
