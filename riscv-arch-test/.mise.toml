[tools]
prek = "0.4.0"
ruby = "3.4.9"
uv = "0.11.16"
"gem:bundler" = "4.0.12"

[settings.ruby]
compile = false

[tasks.prek]
description = "Run prek hooks on all files"
run = "prek run --all-files"

[tasks.prek-install]
description = "Install prek git hooks"
run = "prek install"
